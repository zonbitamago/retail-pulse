name: Scrape & Deploy

on:
  push:
    branches: [main]
  schedule:
    # UTC 0:00, 6:00, 12:00, 18:00 (JST 9:00, 15:00, 21:00, 3:00)
    - cron: "0 0,6,12,18 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  scrape:
    # cron と手動実行時のみスクレイピングを実行
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Run scraper
        run: npx tsx scripts/scrape.ts
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Commit updated news data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/news.json
          git diff --cached --quiet || git commit -m "chore: update news data [$(date -u +%Y-%m-%dT%H:%M:%SZ)]"
          git push

  deploy:
    # scrapeジョブがスキップまたは成功した場合に実行
    if: always() && (needs.scrape.result == 'success' || needs.scrape.result == 'skipped')
    needs: scrape
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci
      - run: npm run build

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
      - id: deployment
        uses: actions/deploy-pages@v4
